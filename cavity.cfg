# ─────────────────────────────────────────────────────────────────────────────
# cavity.cfg — default configuration for lid-driven cavity solver
#
# Copy and modify for different Re / grid / output settings.
# ─────────────────────────────────────────────────────────────────────────────

# Grid
nx          64
ny          64
lx          1.0
ly          1.0

# Physics
reynolds    400        # Re = lid_vel / nu
lid_vel     1.0        # top wall velocity (m/s)
prandtl     0.71       # Prandtl number (0.71 = air)

# Time stepping
dt          0.001

# Pressure solver
p_iter      50         # Gauss-Seidel iterations per time step

# Visualisation
win_size    640        # window pixel size
arrow_step  4          # velocity arrow every N cells (0 = disable)

# CSV export (0 = disable)
export_every 0
